name: Deploy MCP Evernote
on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/mcp-evernote/**"
      - "supabase/functions/_shared/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: Run unit tests
        run: deno test supabase/functions/mcp-evernote/tests/enml_test.ts supabase/functions/mcp-evernote/tests/auth_test.ts --allow-env
      - name: Lint
        run: deno lint supabase/functions/mcp-evernote/

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase functions deploy mcp-evernote --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
